name: Create Daily AI Briefing

on:
  workflow_dispatch:

  schedule:
    - cron: "30 13 * * *"

permissions:
  contents: write

jobs:
  create-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dashboard fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Install required programs
        run: pip install -r requirements.txt

      - name: Run automated tests
        run: pytest -q

      - name: Generate and validate briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_briefing.py

      - name: Save validated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add \
            feed.json \
            sources.html \
            kindle-dashboard.png \
            covered_stories.json

          git diff --cached --quiet || \
            git commit -m "Update curated AI briefing"

          git push
